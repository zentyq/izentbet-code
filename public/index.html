<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IzentBet Code Converter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #06080d;
      --surface: #0f1218;
      --surface2: #161b24;
      --surface3: #1c2230;
      --border: #232b3a;
      --border2: #2e3a4e;
      --text: #edf0f7;
      --text2: #b0b8cc;
      --muted: #6b7a94;
      --accent: #00d4aa;
      --accent2: #00f0c0;
      --accent-dim: rgba(0,212,170,0.12);
      --sporty: #ff6b35;
      --sporty-dim: rgba(255,107,53,0.12);
      --bet9ja: #27ae60;
      --bet9ja-dim: rgba(39,174,96,0.12);
      --xbet: #1e90ff;
      --xbet-dim: rgba(30,144,255,0.12);
      --danger: #ef4444;
      --danger-dim: rgba(239,68,68,0.1);
      --warn: #f59e0b;
      --radius: 14px;
      --radius-sm: 10px;
      --shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── Animated background ─────────────────── */
    .bg-glow {
      position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
      width: 800px; height: 800px;
      background: radial-gradient(circle, rgba(0,212,170,0.06) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    .bg-glow-2 {
      position: fixed; bottom: -300px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(30,144,255,0.04) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    /* ─── Navbar ──────────────────────────────── */
    .navbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 64px;
      background: rgba(15,18,24,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-brand {
      display: flex; align-items: center; gap: 12px;
    }
    .nav-logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--xbet));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 16px; color: #06080d;
    }
    .nav-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px; font-weight: 700; color: var(--text);
    }
    .nav-title span { color: var(--accent); }
    .nav-status {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--muted);
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ─── Container ───────────────────────────── */
    .container {
      position: relative; z-index: 1;
      max-width: 720px; margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* ─── Hero ────────────────────────────────── */
    .hero {
      text-align: center; margin-bottom: 48px;
    }
    .hero h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 14px;
    }
    .hero h1 .gradient {
      background: linear-gradient(135deg, var(--accent), var(--xbet));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero p {
      font-size: 15px; color: var(--text2); max-width: 480px; margin: 0 auto;
      line-height: 1.7;
    }

    /* ─── Card ────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow);
    }

    /* ─── Input group ─────────────────────────── */
    .input-group {
      margin-bottom: 24px;
    }
    .input-group label {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--text2); margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .input-row {
      display: flex; gap: 12px;
    }
    .input-row input {
      flex: 1;
    }
    input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 18px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px; font-weight: 600;
      color: var(--text);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input[type="text"]::placeholder {
      color: var(--muted); text-transform: none;
      font-weight: 400; letter-spacing: 0;
    }
    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    /* ─── Platform picker ─────────────────────── */
    .platform-label {
      font-size: 13px; font-weight: 600;
      color: var(--text2); margin-bottom: 12px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .platforms {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
      margin-bottom: 28px;
    }
    .platform-btn {
      position: relative;
      display: flex; flex-direction: column; align-items: center;
      gap: 6px; padding: 16px 8px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
    }
    .platform-btn:hover {
      border-color: var(--border2);
      background: var(--surface3);
    }
    .platform-btn.active.sporty {
      border-color: var(--sporty);
      background: var(--sporty-dim);
    }
    .platform-btn.active.bet9ja {
      border-color: var(--bet9ja);
      background: var(--bet9ja-dim);
    }
    .platform-btn.active.xbet {
      border-color: var(--xbet);
      background: var(--xbet-dim);
    }
    .platform-btn .icon {
      font-size: 24px; line-height: 1;
    }
    .platform-btn .name {
      font-size: 12px; font-weight: 600; color: var(--text);
    }
    .platform-btn .tag {
      font-size: 10px; color: var(--muted);
    }
    .platform-btn.coming-soon {
      opacity: 0.45; cursor: default;
    }
    .platform-btn.coming-soon .soon-badge {
      position: absolute; top: 6px; right: 6px;
      background: var(--warn); color: #000;
      font-size: 8px; font-weight: 700;
      padding: 2px 6px; border-radius: 6px;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .check-mark {
      position: absolute; top: 6px; right: 8px;
      font-size: 14px; display: none;
    }
    .platform-btn.active .check-mark { display: block; }

    /* ─── Convert button ──────────────────────── */
    .convert-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--accent), #00b89c);
      border: none; border-radius: var(--radius-sm);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px; font-weight: 700;
      color: #06080d; cursor: pointer;
      transition: all 0.2s;
      position: relative; overflow: hidden;
    }
    .convert-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0,212,170,0.25);
    }
    .convert-btn:active:not(:disabled) {
      transform: translateY(0);
    }
    .convert-btn:disabled {
      opacity: 0.5; cursor: not-allowed;
    }
    .convert-btn .spinner {
      display: none;
      width: 20px; height: 20px;
      border: 2.5px solid rgba(6,8,13,0.2);
      border-top-color: #06080d;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    .convert-btn.loading .btn-text { display: none; }
    .convert-btn.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Results ─────────────────────────────── */
    .results-section {
      margin-top: 32px;
      display: none;
    }
    .results-section.visible { display: block; }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      animation: slideUp 0.4s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .result-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
    }
    .result-platform {
      display: flex; align-items: center; gap: 10px;
    }
    .result-platform .dot {
      width: 10px; height: 10px; border-radius: 50%;
    }
    .result-platform .dot.sporty { background: var(--sporty); box-shadow: 0 0 8px var(--sporty); }
    .result-platform .dot.bet9ja { background: var(--bet9ja); box-shadow: 0 0 8px var(--bet9ja); }
    .result-platform .dot.xbet { background: var(--xbet); box-shadow: 0 0 8px var(--xbet); }
    .result-platform .label {
      font-weight: 700; font-size: 14px;
    }
    .result-status {
      font-size: 12px; font-weight: 600;
      padding: 4px 12px; border-radius: 20px;
    }
    .result-status.success {
      background: rgba(0,212,170,0.12); color: var(--accent);
    }
    .result-status.fail {
      background: var(--danger-dim); color: var(--danger);
    }

    .result-body { padding: 24px; }
    .result-code-wrap {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px 20px;
      margin-bottom: 16px;
    }
    .result-code {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px; font-weight: 700;
      letter-spacing: 0.06em;
    }
    .copy-btn {
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 12px; font-weight: 600;
      color: var(--text2); cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    .copy-btn:hover {
      background: var(--accent-dim); border-color: var(--accent);
      color: var(--accent);
    }
    .copy-btn.copied {
      background: var(--accent-dim); border-color: var(--accent);
      color: var(--accent);
    }
    .open-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 600;
      color: var(--accent); text-decoration: none;
      transition: opacity 0.2s;
    }
    .open-link:hover { opacity: 0.75; }

    .result-meta {
      display: flex; gap: 20px; margin-top: 12px;
      font-size: 12px; color: var(--muted);
    }
    .result-meta span { display: flex; align-items: center; gap: 4px; }

    /* ─── Selections table ────────────────────── */
    .selections-toggle {
      display: flex; align-items: center; gap: 8px;
      margin-top: 16px; padding: 0; border: none;
      background: none; font-size: 13px; font-weight: 600;
      color: var(--text2); cursor: pointer;
      transition: color 0.2s;
    }
    .selections-toggle:hover { color: var(--text); }
    .selections-toggle .arrow { transition: transform 0.2s; }
    .selections-toggle.open .arrow { transform: rotate(90deg); }

    .selections-list {
      display: none; margin-top: 12px;
    }
    .selections-list.open { display: block; }

    .sel-item {
      display: flex; align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .sel-item:last-child { border-bottom: none; }
    .sel-num {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--surface3); font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-right: 12px; color: var(--muted);
    }
    .sel-info { flex: 1; min-width: 0; }
    .sel-match {
      font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sel-pick {
      font-size: 12px; color: var(--text2); margin-top: 2px;
    }
    .sel-odds {
      font-weight: 700; font-size: 14px; margin-left: 12px;
      flex-shrink: 0;
    }
    .sel-status-icon {
      margin-left: 10px; flex-shrink: 0; font-size: 14px;
    }

    /* ─── Error ───────────────────────────────── */
    .error-card {
      background: var(--danger-dim);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: var(--radius);
      padding: 24px;
      animation: slideUp 0.4s ease;
    }
    .error-card .error-title {
      font-weight: 700; font-size: 15px; color: var(--danger);
      margin-bottom: 6px;
    }
    .error-card .error-msg {
      font-size: 13px; color: var(--text2); line-height: 1.6;
    }

    /* ─── Footer ──────────────────────────────── */
    .footer {
      text-align: center; padding: 40px 20px;
      font-size: 12px; color: var(--muted);
    }
    .footer a { color: var(--accent); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    /* ─── Responsive ──────────────────────────── */
    @media (max-width: 520px) {
      .container { padding: 24px 14px 60px; }
      .card { padding: 22px 18px; }
      .platforms { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .platform-btn { padding: 12px 6px; }
      .result-code { font-size: 22px; }
      .result-body { padding: 18px; }
      .result-header { padding: 14px 18px; }
      .input-row { flex-direction: column; }
      .navbar { padding: 0 16px; }
    }
  </style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-glow-2"></div>

<!-- Navbar -->
<nav class="navbar">
  <div class="nav-brand">
    <div class="nav-logo">IZ</div>
    <div class="nav-title">Izent<span>Bet</span> Converter</div>
  </div>
  <div class="nav-status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Connected</span>
  </div>
</nav>

<!-- Main -->
<div class="container">

  <!-- Hero -->
  <div class="hero">
    <h1>Convert Your <span class="gradient">Booking Code</span> Instantly</h1>
    <p>Paste your IzentBet booking code and convert it to SportyBet, Bet9ja, or 1xBet in seconds.</p>
  </div>

  <!-- Converter Card -->
  <div class="card">
    <div class="input-group">
      <label>Booking Code</label>
      <div class="input-row">
        <input type="text" id="codeInput" placeholder="e.g. C88209" maxlength="20" autocomplete="off" spellcheck="false" />
      </div>
    </div>

    <div class="platform-label">Convert To</div>
    <div class="platforms" id="platformPicker">
      <button class="platform-btn sporty active" data-platform="sportybet" onclick="togglePlatform(this)">
        <span class="check-mark">&#10003;</span>
        <span class="icon">&#9917;</span>
        <span class="name">SportyBet</span>
        <span class="tag">Nigeria</span>
      </button>
      <button class="platform-btn bet9ja active" data-platform="bet9ja" onclick="togglePlatform(this)">
        <span class="check-mark">&#10003;</span>
        <span class="icon">&#127942;</span>
        <span class="name">Bet9ja</span>
        <span class="tag">Nigeria</span>
      </button>
      <button class="platform-btn xbet coming-soon" data-platform="1xbet">
        <span class="soon-badge">Soon</span>
        <span class="icon">&#127919;</span>
        <span class="name">1xBet</span>
        <span class="tag">Coming Soon</span>
      </button>
    </div>

    <button class="convert-btn" id="convertBtn" onclick="convert()">
      <span class="btn-text">Convert Code &#10132;</span>
      <div class="spinner"></div>
    </button>
  </div>

  <!-- Results -->
  <div class="results-section" id="results"></div>

</div>

<!-- Footer -->
<div class="footer">
  Built with &#9889; by <a href="https://izentbet.com" target="_blank" rel="noopener">IzentBet</a> &middot; Fast &amp; free booking code conversion
</div>

<script>
const API_BASE = window.location.origin;
let selectedPlatforms = new Set(['sportybet', 'bet9ja']);

function togglePlatform(btn) {
  if (btn.classList.contains('coming-soon')) return;
  const p = btn.dataset.platform;
  if (selectedPlatforms.has(p)) {
    selectedPlatforms.delete(p);
    btn.classList.remove('active');
  } else {
    selectedPlatforms.add(p);
    btn.classList.add('active');
  }
}

function sanitize(str) {
  const el = document.createElement('div');
  el.textContent = str;
  return el.innerHTML;
}

async function convert() {
  const code = document.getElementById('codeInput').value.trim();
  if (!code) { document.getElementById('codeInput').focus(); return; }
  if (selectedPlatforms.size === 0) return;

  const btn = document.getElementById('convertBtn');
  const results = document.getElementById('results');
  btn.classList.add('loading');
  btn.disabled = true;
  results.className = 'results-section visible';
  results.innerHTML = '';

  const platforms = [...selectedPlatforms];

  // Fire all platform conversions in parallel
  const promises = platforms.map(async platform => {
    try {
      const resp = await fetch(`${API_BASE}/api/public/convert`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bookingCode: code, platform })
      });
      const data = await resp.json();
      return { platform, data, status: resp.status };
    } catch (err) {
      return { platform, data: null, error: err.message };
    }
  });

  const outcomes = await Promise.all(promises);

  for (const outcome of outcomes) {
    results.innerHTML += renderResult(outcome);
  }

  btn.classList.remove('loading');
  btn.disabled = false;
}

function renderResult({ platform, data, error }) {
  const pConf = {
    sportybet: { label: 'SportyBet', dot: 'sporty', color: 'var(--sporty)' },
    bet9ja: { label: 'Bet9ja', dot: 'bet9ja', color: 'var(--bet9ja)' },
    '1xbet': { label: '1xBet', dot: 'xbet', color: 'var(--xbet)' }
  };
  const c = pConf[platform] || pConf.sportybet;

  if (error || !data) {
    return `
      <div class="error-card">
        <div class="error-title">${sanitize(c.label)} Conversion Failed</div>
        <div class="error-msg">${sanitize(error || 'No response from server. Please try again.')}</div>
      </div>`;
  }

  if (!data.success) {
    return `
      <div class="result-card">
        <div class="result-header">
          <div class="result-platform">
            <div class="dot ${sanitize(c.dot)}"></div>
            <span class="label">${sanitize(c.label)}</span>
          </div>
          <span class="result-status fail">Failed</span>
        </div>
        <div class="result-body">
          <div class="error-card" style="margin:0">
            <div class="error-title">${sanitize(data.code || 'Error')}</div>
            <div class="error-msg">${sanitize(data.error || 'Conversion failed')}</div>
          </div>
          ${data.matched !== undefined ? `
          <div class="result-meta">
            <span>&#128204; Matched: ${parseInt(data.matched, 10)}/${parseInt(data.total, 10)}</span>
          </div>` : ''}
          ${data.selections ? renderSelections(data.selections) : ''}
        </div>
      </div>`;
  }

  const uid = `sel-${platform}-${Date.now()}`;
  return `
    <div class="result-card">
      <div class="result-header">
        <div class="result-platform">
          <div class="dot ${sanitize(c.dot)}"></div>
          <span class="label">${sanitize(c.label)}</span>
        </div>
        <span class="result-status success">Success</span>
      </div>
      <div class="result-body">
        <div class="result-code-wrap">
          <span class="result-code" style="color:${c.color}">${sanitize(data.convertedCode)}</span>
          <button class="copy-btn" onclick="copyCode(this, '${sanitize(data.convertedCode)}')">
            <span>&#128203;</span> Copy
          </button>
        </div>
        ${data.convertedURL ? `
        <a class="open-link" href="${sanitize(data.convertedURL)}" target="_blank" rel="noopener">
          Open on ${sanitize(c.label)} &#8599;
        </a>` : ''}
        <div class="result-meta">
          <span>&#128204; Matched: ${parseInt(data.matched, 10)}/${parseInt(data.total, 10)}</span>
          <span>&#9889; ${parseInt(data.ms, 10)}ms</span>
        </div>
        ${data.selections ? renderSelections(data.selections, uid) : ''}
      </div>
    </div>`;
}

function renderSelections(sels, uid) {
  if (!sels || sels.length === 0) return '';
  const id = uid || `sel-${Date.now()}`;
  let html = `
    <button class="selections-toggle" onclick="toggleSel(this, '${sanitize(id)}')">
      <span class="arrow">&#9654;</span> View ${sels.length} selection${sels.length > 1 ? 's' : ''}
    </button>
    <div class="selections-list" id="${sanitize(id)}">`;
  sels.forEach((s, i) => {
    const converted = s.converted !== false;
    html += `
      <div class="sel-item">
        <div class="sel-num">${i + 1}</div>
        <div class="sel-info">
          <div class="sel-match">${sanitize(s.match || '')}</div>
          <div class="sel-pick">${sanitize(s.market || '')} &mdash; ${sanitize(s.pick || '')}</div>
        </div>
        <div class="sel-odds">${sanitize(String(s.odds || ''))}</div>
        <div class="sel-status-icon">${converted ? '&#9989;' : '&#10060;'}</div>
      </div>`;
  });
  html += '</div>';
  return html;
}

function toggleSel(btn, id) {
  btn.classList.toggle('open');
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function copyCode(btn, code) {
  navigator.clipboard.writeText(code).then(() => {
    btn.innerHTML = '<span>&#10003;</span> Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = '<span>&#128203;</span> Copy';
      btn.classList.remove('copied');
    }, 2000);
  });
}

// Enter key to convert
document.getElementById('codeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') convert();
});

// Health check
(async function checkHealth() {
  try {
    const r = await fetch(`${API_BASE}/health`);
    if (r.ok) {
      document.getElementById('statusDot').style.background = 'var(--accent)';
      document.getElementById('statusText').textContent = 'Connected';
    }
  } catch {
    document.getElementById('statusDot').style.background = 'var(--danger)';
    document.getElementById('statusText').textContent = 'Offline';
  }
})();
</script>
